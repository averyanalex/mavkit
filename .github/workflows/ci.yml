name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check default features
        run: cargo check

      - name: Unit tests with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  python:
    needs: rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mavkit-python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Build extension
        run: uv run maturin develop

      - name: Smoke test
        run: uv run python -c "import mavkit; print(dir(mavkit))"

      - name: Python tests
        run: uv run pytest tests/ -v

  sitl:
    needs: rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Start SITL bridge
        run: make bridge-up

      - name: Integration tests
        run: make test-sitl-strict

      - name: Dump logs on failure
        if: failure()
        run: |
          cat /tmp/mavkit-mavproxy.log 2>/dev/null || true
          docker logs ardupilot-sitl 2>/dev/null || true

      - name: Teardown
        if: always()
        run: make bridge-down
