name: MAVKit SITL

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  sitl-roundtrip:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Start ArduPilot SITL
        run: |
          docker rm -f ardupilot-sitl >/dev/null 2>&1 || true
          docker pull radarku/ardupilot-sitl:eff32c1f98152ac3d1dc09a1e475733b73ce569f
          docker run -d --rm --name ardupilot-sitl -p 5760:5760 \
            --entrypoint /ardupilot/build/sitl/bin/arducopter \
            radarku/ardupilot-sitl:eff32c1f98152ac3d1dc09a1e475733b73ce569f \
            --model + --speedup 1 --defaults /ardupilot/Tools/autotest/default_params/copter.parm \
            --home 42.3898,-71.1476,14.0,270.0 -w

      - name: Wait for SITL TCP
        run: |
          python - <<'PY'
          import socket, time, sys
          deadline = time.time() + 120
          while time.time() < deadline:
              s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              s.settimeout(1)
              try:
                  s.connect(("127.0.0.1", 5760))
                  print("SITL TCP ready")
                  sys.exit(0)
              except OSError:
                  time.sleep(1)
              finally:
                  s.close()
          print("Timed out waiting for SITL TCP")
          sys.exit(1)
          PY

      - name: Start MAVProxy bridge
        run: |
          nohup uvx --from mavproxy --with future --python 3.11 mavproxy.py \
            --master=tcp:127.0.0.1:5760 \
            --out=udp:127.0.0.1:14550 \
            --daemon --non-interactive \
            --default-modules=link,signing,log,wp,rally,fence,param,relay,tuneopt,arm,mode,calibration,rc,auxopt,misc,cmdlong,battery,terrain,output,layout \
            >/tmp/mavkit-mavproxy.log 2>&1 < /dev/null &
          echo $! >/tmp/mavkit-mavproxy.pid

      - name: Wait for UDP telemetry
        run: |
          python - <<'PY'
          import socket, time, sys
          sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
          sock.bind(("0.0.0.0", 14550))
          sock.settimeout(1)
          deadline = time.time() + 180
          while time.time() < deadline:
              try:
                  data, _ = sock.recvfrom(4096)
                  if data:
                      print("UDP telemetry ready")
                      sys.exit(0)
              except TimeoutError:
                  pass
          print("Timed out waiting for UDP telemetry")
          sys.exit(1)
          PY

      - name: Run SITL tests
        env:
          MAVKIT_SITL_UDP_BIND: 0.0.0.0:14550
          MAVKIT_SITL_STRICT: "1"
        run: cargo test --test sitl_roundtrip -- --ignored --nocapture --test-threads=1

      - name: Dump logs on failure
        if: failure()
        run: |
          cat /tmp/mavkit-mavproxy.log 2>/dev/null || true
          docker logs ardupilot-sitl 2>/dev/null || true

      - name: Teardown
        if: always()
        run: |
          if [ -f /tmp/mavkit-mavproxy.pid ]; then
            kill "$(cat /tmp/mavkit-mavproxy.pid)" >/dev/null 2>&1 || true
          fi
          pkill -f "[m]avproxy.py --master=tcp:127.0.0.1:5760" >/dev/null 2>&1 || true
          docker rm -f ardupilot-sitl >/dev/null 2>&1 || true
